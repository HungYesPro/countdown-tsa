<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Countdown TSA đợt 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 40%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .cd-card {
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 24px;
            padding: 36px 44px;
            text-align: center;
            color: #fff;
            max-width: 480px;
            width: 90vw;
        }
        .cd-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .cd-sub {
            font-size: 0.92rem;
            color: rgba(255,255,255,0.82);
            margin-bottom: 28px;
        }
        .cd-sub b { color: #fff; }
        .cd-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .cd-box {
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 18px 8px 14px;
        }
        .cd-num {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1;
            color: #fff;
        }
        .cd-lbl {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.75);
            margin-top: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .cd-footer {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }
        @media (max-width: 420px) {
            .cd-grid { grid-template-columns: repeat(2, 1fr); }
            .cd-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
<div class="cd-card">
    <div class="cd-title">⏳ Countdown TSA đợt 3</div>
    <div class="cd-sub">Đếm ngược đến <b>07:00 • 16/05/2026</b></div>
    <div class="cd-grid" id="grid">
        <div class="cd-box"><div class="cd-num" id="days">0</div><div class="cd-lbl">Ngày</div></div>
        <div class="cd-box"><div class="cd-num" id="hours">0</div><div class="cd-lbl">Giờ</div></div>
        <div class="cd-box"><div class="cd-num" id="minutes">0</div><div class="cd-lbl">Phút</div></div>
        <div class="cd-box"><div class="cd-num" id="seconds">0</div><div class="cd-lbl">Giây</div></div>
    </div>
    <div class="cd-footer">"Học, học nữa, học mãi"</div>
</div>
<script>
    const target = new Date(2026, 4, 16, 7, 0, 0).getTime();
    function tick() {
        const diff = target - Date.now();
        if (diff <= 0) {
            document.getElementById('grid').innerHTML =
                '<div style="font-size:1.3rem;font-weight:600;padding:16px">🎉 ĐÃ ĐẾN THỜI ĐIỂM! CHÚC BẠN THI TỐT NHÉ 😍</div>';
            return;
        }
        document.getElementById('days').textContent    = Math.floor(diff / 86400000);
        document.getElementById('hours').textContent   = Math.floor(diff / 3600000) % 24;
        document.getElementById('minutes').textContent = Math.floor(diff / 60000) % 60;
        document.getElementById('seconds').textContent = Math.floor(diff / 1000) % 60;
    }
    tick();
    setInterval(tick, 1000);
</script>
</body>
</html>
